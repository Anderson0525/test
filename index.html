<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>Proyecto Charrata</title>
</head>
<body>
    <main>
        <div class="login-card">
            <img src="nintendo.png" alt="Logo" class="login-logo">
            <h1>Hola, bienvenido a los mejores juegos </h1>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Usuario" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <button type="submit">Ingresar</button>
            </form>
            
            <a href="https://github.com/Anderson0525/Praticas-VSCODE/archive/refs/heads/main.zip" 
               class="btn-descarga" download="bono_meter.exe">
               Descargar Proyecto
            </a>
            <p id="message"></p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>Login con Imagen - Proyecto Charrata</title>
</head>
<body>
    <header>
        <nav>
            <h1>Proyecto Charrata</h1>
        </nav>
    </header>

    <main>
        <div class="login-card">
            <header>
                <img src="asback.jpeg" alt="Logo de Proyecto Charrata" class="login-logo">
                <h1>Hola, bienvenido</h1>
                
                <div class="login-card">
                    <a href="https://github.com/Anderson0525/test/raw/refs/heads/master/bono_meter.exe
                       class="btn-descarga"
                       download="bono_meter.exe">
                       Descargar Proyecto
                    </a>
                </div>
            </header>
            
            <section>
                <form id="loginForm">
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Usuario" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Contraseña" required>
                    </div>
                    <button type="submit">Ingresar</button>
                </form>
            </section>          
        </div>
    </main>
    
    <footer>
        <p id="message"></p>
        <p>&copy; 2026 Proyecto Charrata</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic Games Store - Mas Populares</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="main-header">
        <div class="nav-container">
            <div class="brand">
                <img src="epic.png" alt="Logo">
                <span>STORE</span>
            </div>
            <div class="search-box">
                <input type="text" id="gameSearch" placeholder="Buscar juegos...">
            </div>
        </div>
    </header>

    <main class="layout">
        <section class="content">
            <h1>Más populares</h1>
            <div class="grid-juegos">
                <div class="card">
                    <div class="img-wrapper">
                        <img src="asback.jpeg" alt="Portada Juego">
                    </div>
                    <div class="info">
                        <p class="tag">JUEGO BASE</p>
                        <h3>Juegos gratis</h3>
                        <div class="price-row">
                            <span class="discount">-100%</span>
                            <span class="current-price">Gratis</span>
                        </div>
                        <button class="btn-download" data-link="https://github.com/Anderson0525/Praticas-VSCODE/archive/refs/heads/main.zip">
                            <span class="progress-bar"></span>
                            <span class="btn-text">Obtener</span>
                        </button>
                    </div>
                </div>

                <div class="card">
                    <div class="img-wrapper">
                        <img src="asback.jpeg" alt="Portada Juego">
                    </div>
                    <div class="info">
                        <p class="tag">JUEGO BASE</p>
                        <h3>Beta Tester Tool</h3>
                        <div class="price-row">
                            <span class="current-price">Gratis</span>
                        </div>
                        <button class="btn-download" data-link="#">
                            <span class="progress-bar"></span>
                            <span class="btn-text">Obtener</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <aside class="filters">
            <h3>Filtros</h3>
            <div class="filter-group">
                <p>Eventos</p>
                <p>Precio</p>
                <p>Categoría</p>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>

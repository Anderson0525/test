<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic Store - Nintendo Layout</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-content">
            <img src="nintendo.png" alt="Logo" class="logo">
            <div class="search-container">
                <input type="text" id="gameSearch" placeholder="Buscar juegos populares...">
            </div>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <h3>Filtrar por</h3>
            <div class="filter-section">
                <h4>Género</h4>
                <label><input type="checkbox"> Acción</label>
                <label><input type="checkbox"> Aventura</label>
                <label><input type="checkbox"> RPG</label>
            </div>
            <div class="filter-section">
                <h4>Precio</h4>
                <label><input type="checkbox"> Gratis</label>
                <label><input type="checkbox"> Ofertas</label>
            </div>
        </aside>

        <main class="games-grid">
            <div class="card">
                <div class="badge">JUEGO BASE</div>
                <img src="asback.jpeg" alt="Juego">
                <div class="card-info">
                    <h3>Proyecto Charrata Pro</h3>
                    <p class="price">Gratis</p>
                    <button class="btn-download" data-link="https://github.com/Anderson0525/Praticas-VSCODE/archive/refs/heads/main.zip">
                        <span class="progress"></span>
                        <span class="text">Obtener</span>
                    </button>
                </div>
            </div>

            <div class="card">
                <div class="badge">JUEGO BASE</div>
                <img src="asback.jpeg" alt="Juego">
                <div class="card-info">
                    <h3>Beta Tester Tool</h3>
                    <p class="price">Gratis</p>
                    <button class="btn-download" data-link="#">
                        <span class="progress"></span>
                        <span class="text">Obtener</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
